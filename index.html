<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Asistencia - HH Transportes</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        video { width: 100%; border-radius: 8px; background: #000; }
        button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; color: white; }
        .btn-entrada { background-color: #28a745; }
        .btn-salida { background-color: #dc3545; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #status { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Asistencia</h2>
        <p id="info-sede">Sede: <span id="sede-nombre">Cargando...</span></p>
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        
        <button id="btnE" class="btn-entrada" onclick="registrar('ENTRADA')">REGISTRAR ENTRADA</button>
        <button id="btnS" class="btn-salida" onclick="registrar('SALIDA')">REGISTRAR SALIDA</button>
        
        <div id="status"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const idEmpleado = urlParams.get('id');
        const sedeUrl = urlParams.get('sede'); // Ejemplo: ?id=9923&sede=Manzanillo
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby0xPIwIoBHs1SmGcPoXRLe7pLMTWJPHSu3y94mrYFkrNDxi2dEPrdH4Lc0BicJpHaMww/exec";

        document.getElementById('sede-nombre').innerText = sedeUrl || "No especificada";

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const status = document.getElementById('status');

        // Iniciar cámara
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => video.srcObject = stream);

        async function registrar(tipo) {
            if (!idEmpleado || !sedeUrl) {
                alert("Falta ID o Sede en el enlace.");
                return;
            }

            const btnE = document.getElementById('btnE');
            const btnS = document.getElementById('btnS');
            btnE.disabled = true; btnS.disabled = true;
            status.innerText = "Procesando...";

            // Capturar Foto
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const fotoBase64 = canvas.toDataURL('image/png');

            // Obtener Ubicación
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const datos = {
                    id: idEmpleado,
                    sede: sedeUrl,
                    tipo: tipo,
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    foto: fotoBase64
                };

                try {
                    const response = await fetch(WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors', // Importante para evitar bloqueos CORS básicos
                        body: JSON.stringify(datos)
                    });
                    
                    status.innerText = "¡Registro enviado con éxito!";
                    status.style.color = "green";
                } catch (error) {
                    status.innerText = "Error al enviar datos.";
                    status.style.color = "red";
                    btnE.disabled = false; btnS.disabled = false;
                }
            }, () => {
                alert("Debes permitir el GPS para marcar asistencia.");
                btnE.disabled = false; btnS.disabled = false;
            });
        }
    </script>
</body>
</html>
