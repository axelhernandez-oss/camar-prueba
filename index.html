<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HH Asistencia - Registro</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background: #1a1a1a; 
            color: white; 
            padding: 20px; 
            margin: 0;
        }
        .card { 
            background: #2d2d2d; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            max-width: 400px; 
            margin: auto; 
            border-top: 5px solid #00d4ff;
        }
        video { 
            width: 100%; 
            border-radius: 12px; 
            background: #000; 
            transform: scaleX(-1); 
            margin-bottom: 15px;
            border: 2px solid #444;
        }
        .btn { 
            width: 100%; 
            padding: 18px; 
            border: none; 
            border-radius: 12px; 
            color: white; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 15px; 
            transition: all 0.3s ease;
        }
        .entrada { background: #28a745; box-shadow: 0 4px #1e7e34; }
        .salida { background: #007bff; box-shadow: 0 4px #0056b3; }
        .btn:disabled { background: #555 !important; box-shadow: none !important; cursor: not-allowed; }

        #status { 
            margin-top: 20px; 
            font-weight: bold; 
            font-size: 16px; 
            padding: 15px;
            border-radius: 10px;
            display: none;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top: 0;">REGISTRO HH</h2>
    <p>ID EMPLEADO: <b id="displayId" style="color: #00d4ff;">Cargando...</b></p>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    
    <button id="btnE" class="btn entrada" onclick="enviar('ENTRADA')">REGISTRAR ENTRADA</button>
    <button id="btnS" class="btn salida" onclick="enviar('SALIDA')">REGISTRAR SALIDA</button>
    
    <div id="status"></div>
</div>

<script>
    // 1. CONFIGURACIÓN
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby0xPIwIoBHs1SmGcPoXRLe7pLMTWJPHSu3y94mrYFkrNDxi2dEPrdH4Lc0BicJpHaMww/exec";
    
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');
    document.getElementById('displayId').innerText = id || "SIN ID DETECTADO";

    // 2. INICIAR CÁMARA
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => { 
            document.getElementById('video').srcObject = stream; 
        })
        .catch(err => {
            mostrarMensaje("❌ Error: No se puede acceder a la cámara", "#ff4444");
        });

    // 3. FUNCIÓN PRINCIPAL DE ENVÍO
    function enviar(tipo) {
        const btnE = document.getElementById('btnE');
        const btnS = document.getElementById('btnS');
        
        if (!id || id === "SIN ID DETECTADO") {
            mostrarMensaje("❌ Error: Enlace inválido (sin ID)", "#ff4444");
            return;
        }

        btnE.disabled = true;
        btnS.disabled = true;
        mostrarMensaje("⏳ Verificando con el servidor...", "#aaa");

        navigator.geolocation.getCurrentPosition(pos => {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);

            const payload = {
                id: id,
                lat: pos.coords.latitude,
                lng: pos.coords.longitude,
                foto: canvas.toDataURL('image/png'),
                tipo: tipo
            };

            fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            })
            .then(res => res.text())
            .then(texto => {
                const respuesta = texto.trim();
                console.log("Servidor:", respuesta);

                if (respuesta === "YA_TIENE_ENTRADA") {
                    mostrarMensaje("⚠️ YA REGISTRASTE TU ENTRADA HOY", "#ffbb33");
                    btnE.disabled = false; btnS.disabled = false;
                } 
                else if (respuesta === "YA_TIENE_SALIDA") {
                    mostrarMensaje("⚠️ YA REGISTRASTE TU SALIDA HOY", "#ffbb33");
                    btnE.disabled = false; btnS.disabled = false;
                } 
                else if (respuesta === "ID_NO_AUTORIZADO") {
                    mostrarMensaje("❌ TU ID NO ESTÁ REGISTRADO", "#ff4444");
                    btnE.disabled = false; btnS.disabled = false;
                } 
                else if (respuesta === "OK") {
                    mostrarMensaje("✅ " + tipo + " REGISTRADA CON ÉXITO", "#00c851");
                    btnE.style.display = "none";
                    btnS.style.display = "none";
                } 
                else {
                    mostrarMensaje("❌ Error del servidor: " + respuesta, "#ff4444");
                    btnE.disabled = false; btnS.disabled = false;
                }
            })
            .catch(err => {
                mostrarMensaje("❌ Error de red o servidor", "#ff4444");
                btnE.disabled = false; btnS.disabled = false;
            });

        }, err => {
            mostrarMensaje("❌ Error: Activa el GPS", "#ff4444");
            btnE.disabled = false; btnS.disabled = false;
        });
    }

    function mostrarMensaje(msg, color) {
        const status = document.getElementById('status');
        status.style.display = "block";
        status.innerText = msg;
        status.style.color = color;
        status.style.border = "1px solid " + color;
    }
</script>

</body>
</html>
